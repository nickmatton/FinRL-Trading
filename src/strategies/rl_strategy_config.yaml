strategy:
  name: rl_portfolio
  version: "1.0.0"
  description: >
    RL-based portfolio allocation using PPO to learn continuous
    weight vectors from historical price data.

# ── RL training parameters ────────────────────────────────
training:
  algorithm: PPO
  total_timesteps: 100000
  learning_rate: 0.0003
  batch_size: 64
  n_epochs: 10
  gamma: 0.99

# ── Environment parameters ────────────────────────────────
environment:
  window_size: 20
  transaction_cost: 0.001
  reward_scaling: 100.0

# ── Walk-forward / rolling window ─────────────────────────
rolling:
  train_days: 504          # ~2 years of trading days
  retrain_freq: "Q"        # retrain quarterly

# ── Portfolio constraints ─────────────────────────────────
portfolio:
  max_positions: 25
  max_single_weight: 0.10
  min_weight: 0.01

# ── Asset universe (50 large-cap US stocks) ───────────────
symbols:
  # Tech
  - AAPL
  - MSFT
  - GOOGL
  - AMZN
  - NVDA
  - META
  - TSLA
  - AVGO
  - ADBE
  - CRM
  - ORCL
  - NFLX
  - AMD
  - INTC
  - QCOM
  # Finance
  - JPM
  - V
  - MA
  - BAC
  - GS
  - BLK
  - AXP
  # Health
  - UNH
  - JNJ
  - LLY
  - ABBV
  - MRK
  - PFE
  - TMO
  - ABT
  # Consumer
  - PG
  - KO
  - PEP
  - COST
  - WMT
  - HD
  - MCD
  - NKE
  # Energy / Industrials
  - XOM
  - CVX
  - CAT
  - GE
  - UNP
  - HON
  # Comm / Utilities / Real Estate
  - DIS
  - CMCSA
  - T
  - NEE
  - SO
  - AMT

# ── Benchmarks ────────────────────────────────────────────
benchmark:
  tickers:
    - SPY
    - QQQ

# ── Paths ─────────────────────────────────────────────────
paths:
  data_root: ./data/fmp_daily
  model_dir: ./models/rl_portfolio
  weights_dir: ./src/strategies/output/weights/rl_portfolio

dates:
  start_date: "2020-01-01"
  end_date: null
